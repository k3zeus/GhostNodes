version: "3.7"

services:
  mempool-db:
    image: mariadb:10.5
    container_name: mempool-db
    restart: always
    environment:
      MYSQL_DATABASE: mempool
      MYSQL_USER: ${MEMPOOL_DB_USER:-mempool}
      MYSQL_PASSWORD: ${MEMPOOL_DB_PASS:-mempool_password}
      MYSQL_ROOT_PASSWORD: ${MEMPOOL_DB_ROOT_PASS:-mempool_root_password}
    volumes:
      - ${DOCKER_ROOT}/satoshi/mempool/db:/var/lib/mysql

  mempool-api:
    image: mempool/backend:latest
    container_name: mempool-api
    restart: always
    depends_on:
      - mempool-db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_HOST: mempool-db
      DATABASE_DATABASE: mempool
      DATABASE_USERNAME: ${MEMPOOL_DB_USER:-mempool}
      DATABASE_PASSWORD: ${MEMPOOL_DB_PASS:-mempool_password}
      CORE_RPC_HOST: ${BITCOIN_RPC_HOST:-host.docker.internal}
      CORE_RPC_PORT: ${BITCOIN_RPC_PORT:-8332}
      CORE_RPC_USERNAME: ${BITCOIN_RPC_USER:-satoshi}
      CORE_RPC_PASSWORD: ${BITCOIN_RPC_PASS:-changeme}

  mempool-frontend:
    image: mempool/frontend:latest
    container_name: mempool-frontend
    restart: always
    depends_on:
      - mempool-api
    environment:
      FRONTEND_HTTP_PORT: 8080
      BACKEND_MAINNET_HTTP_HOST: mempool-api
    ports:
      - "${MEMPOOL_WEB_PORT:-8080}:8080"
