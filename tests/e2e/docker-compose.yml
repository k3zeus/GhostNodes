version: "3.9"

services:
  debian-tester:
    build:
      context: .
      dockerfile: Dockerfile.debian
    platform: linux/amd64
    container_name: ghostnodes-e2e
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - GN_REPO_URL=http://host.docker.internal:8080/beta.tar.gz
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
